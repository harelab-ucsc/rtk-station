# RTK AP — DHCP only on wlan0, do not touch ethernet
# port=0 disables DNS so dnsmasq doesn't conflict with systemd-resolved on port 53
port=0
interface=wlan0
bind-dynamic
dhcp-range=172.31.106.10,172.31.106.100,255.255.255.0,24h
dhcp-option=3,172.31.106.2   # default gateway = Pi
dhcp-option=6,172.31.106.2   # DNS = Pi
