network:
  version: 2
  renderer: networkd

  ethernets:
    end0:
      dhcp4: true   # connects to lab/field network, gets IP via DHCP

  # wlan0 IP (172.31.106.2/24) is assigned via systemd-networkd directly
  # (see install_wifi_ap.sh) so netplan doesn't need to know about it.
  # hostapd manages the AP association.
